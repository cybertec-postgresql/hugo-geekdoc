{{- $headers := .TableOfContents -}}
{{- if $headers -}}
  <p class="cx-toc__label">On this page</p>
  {{ $headers }}
  <div class="cx-toc__divider"></div>
  <!-- <div class="cx-toc__feedback">
    <p>Was this helpful?</p>
    <div class="cx-feedback-btns">
      <button class="cx-feedback-btn" onclick="this.textContent='Thanks!'">👍 Yes</button>
      <button class="cx-feedback-btn" onclick="this.textContent='Noted'">👎 No</button>
    </div>
  </div> -->
  {{ if default false .Site.Params.geekdocCustomLayout }}
    {{ partial "taxonomy-meta" . }}
    <div class="cx-toc__bottom">
      {{ partial "taxonomy-links" . }}
    </div>
  {{ end }}
  <script>
    (function () {
      var links = document.querySelectorAll(".cx-toc-panel nav a");
      if (!links.length) return;
      var map = {};
      links.forEach(function (a) {
        map[a.getAttribute("href")] = a;
      });
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          var link = map["#" + entry.target.id];
          if (link) link.classList.toggle("active", entry.isIntersecting);
        });
      }, { rootMargin: "-10% 0px -80% 0px", threshold: 0 });
      document.querySelectorAll("h2[id], h3[id]").forEach(function (h) {
        obs.observe(h);
      });
    })();
  </script>
{{- end -}}
